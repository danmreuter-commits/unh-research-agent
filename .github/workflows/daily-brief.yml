name: UNH Daily Intel Brief

on:
  schedule:
    # 12:00 UTC = 8:00 AM Eastern Time (US).
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch:

jobs:
  daily-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run UNH Research Agent
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_HOST:      ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT:      ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER:      ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS:      ${{ secrets.EMAIL_SMTP_PASS }}
          AIRTABLE_API_KEY:     ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID:     ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME:  ${{ secrets.AIRTABLE_TABLE_NAME }}
        run: python main.py

      - name: Save deduplication state
        run: |
          git config user.name  "unh-agent[bot]"
          git config user.email "unh-agent@users.noreply.github.com"
          git add state.json || true
          git diff --staged --quiet || git commit -m "chore: update dedup state [skip ci]"
          git push || true
